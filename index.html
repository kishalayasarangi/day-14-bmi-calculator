<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <h1 class="app-title">BMI Calculator</h1>
    <p class="subtitle">Body Mass Index — know your health status</p>

    <!-- UNIT TOGGLE -->
    <div class="unit-toggle">
      <button class="unit-btn active" id="btn-metric" onclick="switchUnit('metric')">Metric (kg/cm)</button>
      <button class="unit-btn" id="btn-imperial" onclick="switchUnit('imperial')">Imperial (lb/in)</button>
    </div>

    <!-- INPUT FORM -->
    <div class="form-card">

      <div class="input-group">
        <label>Age</label>
        <div class="input-row">
          <input type="number" id="age" placeholder="e.g. 20" min="1" max="120"/>
          <span class="unit-label">years</span>
        </div>
      </div>

      <div class="input-group">
        <label>Gender</label>
        <div class="gender-btns">
          <button class="gender-btn active" id="btn-male" onclick="selectGender('male')">Male</button>
          <button class="gender-btn" id="btn-female" onclick="selectGender('female')">Female</button>
        </div>
      </div>

      <div class="input-group">
        <label>Height</label>
        <div class="input-row">
          <input type="number" id="height" placeholder="e.g. 175" min="1"/>
          <span class="unit-label" id="heightUnit">cm</span>
        </div>
      </div>

      <div class="input-group">
        <label>Weight</label>
        <div class="input-row">
          <input type="number" id="weight" placeholder="e.g. 70" min="1"/>
          <span class="unit-label" id="weightUnit">kg</span>
        </div>
      </div>

      <button class="calc-btn" onclick="calculateBMI()">Calculate BMI</button>
    </div>

    <!-- RESULT -->
    <div class="result-card hidden" id="resultCard">

      <div class="bmi-display">
        <div class="bmi-value" id="bmiValue">22.5</div>
        <div class="bmi-label" id="bmiLabel">Normal Weight</div>
      </div>

      <div class="bmi-bar-wrap">
        <div class="bmi-bar">
          <div class="bmi-segment underweight">Underweight</div>
          <div class="bmi-segment normal">Normal</div>
          <div class="bmi-segment overweight">Overweight</div>
          <div class="bmi-segment obese">Obese</div>
        </div>
        <div class="bmi-marker" id="bmiMarker"></div>
      </div>

      <div class="bmi-ranges">
        <div class="range-item"><span class="dot underweight"></span>Underweight: &lt; 18.5</div>
        <div class="range-item"><span class="dot normal"></span>Normal: 18.5 – 24.9</div>
        <div class="range-item"><span class="dot overweight"></span>Overweight: 25 – 29.9</div>
        <div class="range-item"><span class="dot obese"></span>Obese: ≥ 30</div>
      </div>

      <div class="health-tips" id="healthTips"></div>

      <div class="extra-stats" id="extraStats"></div>

    </div>

  </div>

  <footer>Day 14 of 120 · Kishalaya Sarangi · NIT Rourkela</footer>

  <script src="script.js"></script>
</body>
</html>
